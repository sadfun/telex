<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="color-scheme" content="light dark" />
    <title>Telex settings</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      /* TELEGRAM_UI_STYLES */

      :root {
        color-scheme: light dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        min-height: 100vh;
        overscroll-behavior-y: none;
        background: var(--tg-theme-secondary-bg-color, #efeff4);
        touch-action: manipulation;
      }
      button,
      input,
      select,
      textarea,
      option {
        font: inherit;
        font-family: var(--tgui--font-family, -apple-system), BlinkMacSystemFont, "SF Pro Text",
          system-ui, sans-serif;
      }
      #root,
      .appRoot {
        min-height: 100vh;
      }
      .appRoot {
        background: var(--tgui--secondary_bg_color);
      }
      .page {
        width: min(100%, 720px);
        margin: 0 auto;
        padding: 20px 12px calc(112px + env(safe-area-inset-bottom));
      }
      .pageHeader {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
        padding: 6px 8px 18px;
      }
      .pageHeader h1 {
        margin: 0;
      }
      .pageSubtitle,
      .fieldHint,
      .saveStatus,
      .revision {
        color: var(--tgui--hint_color);
      }
      .pageSubtitle {
        margin-top: 3px;
      }
      .revision {
        flex: none;
        padding-bottom: 3px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      .sectionStack {
        display: grid;
        gap: 16px;
      }
      .runtimePanel {
        display: grid;
        gap: 14px;
        padding: 14px 16px 16px;
      }
      .runtimeSummary {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        align-items: center;
        gap: 10px;
      }
      .runtimeDot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--tgui--hint_color);
        box-shadow: 0 0 0 4px color-mix(in srgb, var(--tgui--hint_color) 16%, transparent);
      }
      .runtimeDot-ready {
        background: #31b545;
        box-shadow: 0 0 0 4px color-mix(in srgb, #31b545 16%, transparent);
      }
      .runtimeDot-applying,
      .runtimeDot-restarting {
        background: var(--tgui--accent_text_color);
        box-shadow: 0 0 0 4px var(--tgui--secondary_fill);
      }
      .runtimeDot-degraded {
        background: var(--tgui--destructive_text_color);
        box-shadow: 0 0 0 4px color-mix(in srgb, var(--tgui--destructive_text_color) 16%, transparent);
      }
      .runtimeCopy {
        display: grid;
        min-width: 0;
        gap: 3px;
      }
      .runtimeDetail {
        overflow-wrap: anywhere;
        color: var(--tgui--hint_color);
      }
      .runtimeActions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }
      .field {
        min-width: 0;
        padding: 14px 16px 2px;
      }
      .controlLabel {
        display: block;
        margin: 0 6px 8px;
        color: var(--tgui--section_header_text_color);
        font-weight: var(--tgui--font_weight--accent2);
      }
      .nativeControl {
        display: block;
        width: 100%;
        min-height: 44px;
        padding: 10px 12px;
        border: var(--tgui--border--width) solid var(--tgui--outline);
        border-radius: 12px;
        outline: 0;
        color: var(--tgui--text_color);
        background: var(--tgui--secondary_bg_color);
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
        font-size: 16px;
      }
      .nativeControl:focus {
        border-color: var(--tgui--link_color);
        box-shadow: 0 0 0 2px var(--tgui--secondary_fill);
      }
      .nativeControl:disabled {
        cursor: not-allowed;
        opacity: 0.52;
      }
      .nativeControlError {
        border-color: var(--tgui--destructive_text_color);
      }
      .nativeSelect {
        appearance: auto;
      }
      .nativeSelect option {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      }
      .nativeTextarea {
        min-height: 88px;
        resize: vertical;
      }
      .fieldHint {
        display: block;
        padding: 7px 6px 11px;
      }
      .fieldIssue {
        color: var(--tgui--destructive_text_color);
      }
      .bannerSpacing {
        margin: 0 0 16px;
      }
      .saveDock {
        position: fixed;
        z-index: 2;
        right: 0;
        bottom: 0;
        left: 0;
        padding: 10px 12px calc(12px + env(safe-area-inset-bottom));
        border-top: var(--tgui--border--width) solid var(--tgui--divider);
        background: color-mix(in srgb, var(--tgui--bg_color) 92%, transparent);
        backdrop-filter: blur(18px);
      }
      .saveDockInner {
        display: grid;
        width: min(100%, 696px);
        margin: 0 auto;
        gap: 7px;
      }
      .saveStatus {
        min-height: 16px;
        text-align: center;
      }
      .saveStatusError {
        color: var(--tgui--destructive_text_color);
      }
      .saveStatusReady {
        color: var(--tgui--accent_text_color);
      }
      .loadingRoot {
        display: grid;
        min-height: 100vh;
        place-items: center;
      }
      .featureStage {
        text-transform: capitalize;
      }
      .toggleField {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 14px;
        padding: 13px 16px;
      }
      .toggleCopy {
        min-width: 0;
      }
      .toggleLabel {
        display: block;
        color: var(--tgui--text_color);
        font-weight: var(--tgui--font_weight--accent2);
      }
      .toggleHint {
        display: block;
        margin-top: 3px;
        color: var(--tgui--hint_color);
      }
      .reasoningField {
        padding: 12px 16px 14px;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      }
      .reasoningHeader {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
      }
      .reasoningHeader .controlLabel {
        margin: 0;
      }
      .reasoningValue {
        color: var(--tgui--accent_text_color);
        font-family: inherit;
        font-weight: var(--tgui--font_weight--accent2);
      }
      .reasoningSlider {
        margin: 4px 0 0;
        min-height: 34px;
        padding: 11px 6px;
      }
      .reasoningTicks {
        position: relative;
        height: 14px;
        margin: 2px 6px 0;
        color: var(--tgui--hint_color);
        font-family: inherit;
      }
      .reasoningTick {
        position: absolute;
        top: 0;
        font-family: inherit;
        font-size: 11px;
        font-weight: 500;
        line-height: 14px;
        transform: translateX(-50%);
        white-space: nowrap;
      }
      .reasoningTickActive {
        color: var(--tgui--accent_text_color);
        font-weight: 600;
      }
      .reasoningField .fieldHint {
        padding: 8px 0 0;
      }
      @media (min-width: 700px) {
        .page {
          padding-top: 32px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/miniapp/app.js"></script>
  </body>
</html>
