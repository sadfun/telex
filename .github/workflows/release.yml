name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Verify tag and package version
        run: |
          package_version=$(node -p 'require("./package.json").version')
          test "$GITHUB_REF_NAME" = "v$package_version"
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run build
      - name: Build release bundle
        run: |
          version=$(node -p 'require("./package.json").version')
          npm prune --omit=dev
          mkdir -p "release/telex-$version"
          cp -R dist node_modules "release/telex-$version/"
          cp package.json package-lock.json codex.version README.md LICENSE.md .env.example "release/telex-$version/"
          tar -C "release/telex-$version" -czf "release/telex-$version.tar.gz" .
          cd release
          sha256sum "telex-$version.tar.gz" > "telex-$version.tar.gz.sha256"
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=$(node -p 'require("./package.json").version')
          release_flags=()
          if [[ "$version" == *-* ]]; then release_flags+=(--prerelease); fi
          gh release create "$GITHUB_REF_NAME" \
            "release/telex-$version.tar.gz" \
            "release/telex-$version.tar.gz.sha256" \
            --verify-tag \
            --generate-notes \
            --title "Telex $version" \
            "${release_flags[@]}"
